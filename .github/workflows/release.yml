name: Release

# Cut a release by pushing a tag like v0.1.0. The three package jobs build in
# parallel and attach their artifacts to the GitHub Release for that tag.
# `workflow_dispatch` runs the same builds without publishing a release, so the
# packaging can be tested on demand.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── .deb + AppImage ─────────────────────────────────────────────────────────
  # Built in a Debian trixie container because the project needs Qt 6.8, which
  # stock Ubuntu runners don't ship. trixie provides Qt 6.8 + the Kirigami QML
  # runtime, so the resulting .deb targets Debian/Ubuntu systems with KF6.
  linux-packages:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Install build prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git curl wget file ca-certificates pkg-config \
            clang libclang-dev mold \
            qt6-base-dev qt6-declarative-dev \
            qml6-module-org-kde-kirigami qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts qml6-module-qtquick-window \
            qml6-module-qtqml-workerscript \
            libpipewire-0.3-dev libasound2-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Toolchain versions
        run: |
          cmake --version
          (qmake6 --version || true)
          "$HOME/.cargo/bin/rustc" --version

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB
          cd ..
          mkdir -p dist
          cp build/lyra-*-Linux.deb "dist/lyra_${GITHUB_REF_NAME#v}_amd64.deb" 2>/dev/null \
            || cp build/lyra-*.deb dist/

      - name: Package AppImage
        run: bash packaging/appimage/build-appimage.sh && cp Lyra-x86_64.AppImage dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*

  # ── Flatpak ───────────────────────────────────────────────────────────────
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.7
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lyra.flatpak
          manifest-path: packaging/flatpak/ai.drivee.lyra.yml
          cache-key: flatpak-builder-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: lyra.flatpak

  # ── Attach everything to the Release (tag pushes only) ──────────────────────
  release:
    needs: [linux-packages, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
